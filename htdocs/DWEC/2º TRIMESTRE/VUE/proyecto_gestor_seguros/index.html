<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Agencia de Seguros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .login-container { max-width: 400px; margin-top: 100px; }
        .navbar { margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="app" class="container-fluid">
    
    <div v-if="!logueado" class="container login-container">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4>Acceso Agentes</h4>
            </div>
            <div class="card-body">
                <form @submit.prevent="hacerLogin">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" v-model="formLogin.usuario" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" v-model="formLogin.password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                </form>
                <div v-if="errorLogin" class="alert alert-danger mt-3">{{ errorLogin }}</div>
            </div>
        </div>
    </div>

    <div v-else>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <a class="navbar-brand" href="#">Agencia Seguros</a>
            <div class="ml-auto text-white mr-3">
                <i class="fa fa-user"></i> {{ usuarioActivo.nombre }}
                <button class="btn btn-outline-light btn-sm ml-2" @click="salir">Salir</button>
            </div>
        </nav>

        <div class="container">
            <div class="row mb-3">
                <div class="col-md-8">
                    <h2>Lista de Clientes</h2>
                </div>
                <div class="col-md-4 text-right">
                    <button class="btn btn-success">
                        <i class="fa fa-plus"></i> Nuevo Cliente
                    </button>
                </div>
            </div>

            <div class="card mb-4 bg-light">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-10">
                            <input type="text" class="form-control" v-model="busqueda" placeholder="Buscar por nombre, apellidos o DNI...">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-info btn-block">Buscar</button>
                        </div>
                    </div>
                </div>
            </div>

            <table class="table table-hover shadow-sm bg-white">
                <thead class="thead-dark">
                    <tr>
                        <th>Cliente</th>
                        <th>Nombre y Apellidos</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="cliente in clientesFiltrados" :key="cliente.id">
                        <td>
                            <span :class="cliente.tipo_cliente == 'Empresa' ? 'badge badge-warning' : 'badge badge-info'">
                                {{ cliente.tipo_cliente }}
                            </span>
                        </td>
                        <td>{{ cliente.nombre }} {{ cliente.apellidos }}</td>
                        <td>{{ cliente.email }}</td>
                        <td>{{ cliente.telefono }}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-primary" title="Ver Pólizas"><i class="fa fa-file-contract"></i></button>
                            <button class="btn btn-sm btn-warning" title="Editar"><i class="fa fa-edit"></i></button>
                            <button class="btn btn-sm btn-danger" title="Borrar"><i class="fa fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="scripts/auth.js"></script>
<script src="scripts/clientes.js"></script>
<script src="scripts/main.js"></script>
</body>
</html>
